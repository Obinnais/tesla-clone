<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Website - Hero Section</title>
    <link rel="stylesheet" href="/styles/hero.css">
</head>
<body>
    <section class="hero">
        <!-- Background Image Slider -->
        <div class="hero-background">
            <img src="/images/hero_img1.avif" alt="Car Background 1" class="background-img active">
            <img src="/images/hero_img2.avif" alt="Car Background 2" class="background-img">
            <img src="/images/hero_img3.avif" alt="Car Background 3" class="background-img">
        </div>

        <!-- Arrow Buttons for Image Switching -->
        <button class="arrow-btn left" id="prevBtn">&#10094;</button>
        <button class="arrow-btn right" id="nextBtn">&#10095;</button>

        <!-- Hero Content -->
        <div class="hero-content">
            <h1 class="hero-header">Find Your Perfect Car</h1>
            <p class="hero-paragraph">Discover the latest models with the best features. From luxury sedans to powerful SUVs, we have everything you need to drive your dream.</p>
            <button class="cta-button">Browse Cars</button>
        </div>
    </section>
</body>
</html>
